<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mc-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1 id="mc-title">MC情報を読み込み中...</h1>
      <p id="mc-meta" class="muted"></p>
    </header>

    <section class="card">
      <ul id="mc-info-list" class="meta-list"></ul>
    </section>

    <section class="card">
      <h2>出場大会</h2>
      <ul id="appearances-list" class="list-tight"></ul>
    </section>

    <section class="card">
      <h2>勝った相手</h2>
      <ul id="wins-list" class="list-tight"></ul>
    </section>

    <section class="card">
      <h2>負けた相手</h2>
      <ul id="losses-list" class="list-tight"></ul>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function getMcIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("mc_id");
    }

    function displayValue(value) {
      return (value === null || value === undefined || value === "") ? "−" : value;
    }

    function formatScore(value) {
      if (value === null || value === undefined) return "";
      if (isNaN(Number(value))) return value;
      return Number(value).toFixed(2);
    }

    function renderMcLink(name, id) {
      if (!name) return "";
      if (!id) return name;
      return `<a href="./mc.html?mc_id=${id}">${name}</a>`;
    }

    function renderEventLink(name, id, date) {
      const label = `${date || ""} ${name || ""}`.trim();
      if (!id) return label;
      return `<a href="./event.html?event_id=${id}">${label}</a>`;
    }

    function loadMcDetail() {
      const mcId = getMcIdFromQuery();
      if (!mcId) return;

      const callbackName = "mcCallback";

      window[callbackName] = function(data) {
        const mc = data.mc || {};
        const ranking = data.ranking || {};

        const appearances = data.participated_events || [];
        const wins = data.wins_against || [];
        const losses = data.losses_against || [];

        document.getElementById("mc-title").textContent = mc.mc_name || "";
        document.getElementById("mc-meta").textContent = mc.mc_yomi || "";

        // ⭐ここが今回の修正ポイント
        const rankLabel =
          ranking.rank === null || ranking.rank === undefined || ranking.rank === ""
            ? "圏外"
            : (Number(ranking.rank) <= 100 ? String(ranking.rank) : "圏外");

        const infoItems = [
          ["MCBattle Rank順位", rankLabel],
          ["スコア", displayValue(formatScore(ranking.current_score ?? ranking.score))],
          ["総試合数", displayValue(ranking.total_matches)],
          ["勝利数", displayValue(ranking.wins)],
          ["敗北数", displayValue(ranking.losses)]
        ];

        const infoList = document.getElementById("mc-info-list");
        infoList.innerHTML = "";
        infoItems.forEach(([label, value]) => {
          const li = document.createElement("li");
          li.innerHTML = `<span>${label}：</span>${value}`;
          infoList.appendChild(li);
        });

        const appList = document.getElementById("appearances-list");
        appList.innerHTML = "";
        appearances.forEach(a => {
          const li = document.createElement("li");
          li.innerHTML = renderEventLink(a.event_name, a.event_id, a.event_date);
          appList.appendChild(li);
        });

        const winList = document.getElementById("wins-list");
        winList.innerHTML = "";
        wins.forEach(w => {
          const li = document.createElement("li");
          li.innerHTML = renderMcLink(w.opponent_name, w.opponent_mc_id);
          winList.appendChild(li);
        });

        const lossList = document.getElementById("losses-list");
        lossList.innerHTML = "";
        losses.forEach(l => {
          const li = document.createElement("li");
          li.innerHTML = renderMcLink(l.opponent_name, l.opponent_mc_id);
          lossList.appendChild(li);
        });
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mc_id=${mcId}&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    loadMcDetail();
  </script>
</body>
</html>
