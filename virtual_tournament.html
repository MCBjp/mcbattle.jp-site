<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>仮想MCバトルシミュレーション | MCBattle.jp</title>

<style>
:root{
--bg:#111418;
--text:#f3f5f7;
--muted:#aeb7c2;
--accent:#5b8cff;
--radius:16px;
--panel1:#1a2130;
--panel2:#1a241f;
--panel3:#221d2a;
}

body{
margin:0;
background:#0f1115;
color:var(--text);
font-family:sans-serif;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.panel{
border-radius:var(--radius);
padding:16px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
}

.panel.mode{background:var(--panel1);}
.panel.select{background:var(--panel2);}
.panel.result{background:var(--panel3);}

.btn{
border:1px solid rgba(255,255,255,0.8);
background:transparent;
color:#fff;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
}

.btn:hover{
background:rgba(255,255,255,0.1);
}

.selected-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
}

.slot{
border:1px solid rgba(255,255,255,0.1);
padding:6px;
border-radius:10px;
text-align:center;
}

.loading{
margin-bottom:10px;
}

.bar{
height:8px;
background:#333;
border-radius:999px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#5b8cff;
}

table{
width:100%;
font-size:12px;
}

th,td{
padding:6px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>
<div class="container">

<h2>仮想MCバトル</h2>

<div id="loading" class="loading">
<div>MC読み込み中 <span id="percent">0%</span></div>
<div class="bar"><div id="fill" class="fill"></div></div>
</div>

<div class="panel mode">
<h3>①モード</h3>
<button class="btn" onclick="mode='current'">今の強さ</button>
<button class="btn" onclick="mode='peak'">全盛期</button>
</div>

<div class="panel select">
<h3>②MC選択</h3>

<input id="search" placeholder="検索"/>

<button class="btn" onclick="fillRandom()">Top100ランダム</button>
<button class="btn" onclick="clearAll()">全クリア</button>

<div id="selected" class="selected-grid"></div>

</div>

<div class="panel result">

<button class="btn" onclick="run()">シミュレーション</button>

<h3 id="top"></h3>

<div id="summary"></div>

<table id="table"></table>

</div>

</div>

<script>

let mode="current"
let mcs=[]
let selected=[]

function fakeLoad(){
let p=0
let timer=setInterval(()=>{
p+=5
document.getElementById("percent").innerText=p+"%"
document.getElementById("fill").style.width=p+"%"

if(p>=100){
clearInterval(timer)
document.getElementById("loading").style.display="none"
mcs=[...Array(100)].map((_,i)=>({name:"MC"+i}))
renderSelected()
}
},100)
}

function renderSelected(){
let el=document.getElementById("selected")
el.innerHTML=""
for(let i=0;i<8;i++){
let mc=selected[i]
let div=document.createElement("div")
div.className="slot"
div.innerText=mc?mc.name:"空"
el.appendChild(div)
}
}

function fillRandom(){
selected=mcs.slice(0,8)
renderSelected()
}

function clearAll(){
selected=[]
renderSelected()
}

function run(){
if(selected.length<8)return

let winner=selected[Math.floor(Math.random()*8)]
document.getElementById("top").innerText="最も優勝確率が高いMC: "+winner.name

document.getElementById("top").scrollIntoView({behavior:"smooth"})

document.getElementById("summary").innerText="今回は混戦でした"

let html="<tr><th>MC</th><th>優勝%</th></tr>"
selected.forEach(m=>{
html+=`<tr><td>${m.name}</td><td>${Math.floor(Math.random()*100)}%</td></tr>`
})
document.getElementById("table").innerHTML=html
}

fakeLoad()

</script>

</body>
</html>
