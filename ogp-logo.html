<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCBattle.jp OGP</title>
  <style>
    :root {
      --bg: #0a0b10;
      --bg-2: #11131a;
      --accent: #d8b46a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(216,180,106,.08), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(216,180,106,.05), transparent 20%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .site-logo {
      margin: 0;
      color: var(--accent);
      font-family:
        "Times New Roman",
        Georgia,
        "Baskerville",
        "Hiragino Mincho ProN",
        "Yu Mincho",
        serif;
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      font-size: 118px;
      text-align: center;
      text-shadow: 0 0 18px rgba(216, 180, 106, 0.08);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <h1 class="site-logo">MCBattle.jp</h1>
  </div>
</body>
</html>
