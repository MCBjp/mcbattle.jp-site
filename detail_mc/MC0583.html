<style>
  .page-top{
    margin-bottom: 18px;
  }

  .page-mini-logo{
    margin: 0 0 10px;
  }

  .page-mini-logo .site-mini-logo{
    text-decoration: none;
  }

  .page-nav-pills{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 14px;
    max-width: 100%;
  }

  .page-nav-pill{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    color: var(--accent);
    text-decoration: none;
    font-size: 0.93rem;
    font-weight: 700;
    line-height: 1.2;
    transition:
      transform 0.18s ease,
      background-color 0.18s ease,
      border-color 0.18s ease,
      box-shadow 0.18s ease,
      opacity 0.18s ease;
  }

  .page-nav-pill:hover{
    text-decoration: none;
    transform: translateY(-1px);
    background: rgba(255,255,255,0.07);
    border-color: var(--line-strong);
    box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
    opacity: 1;
  }

  .page-nav-break{
    flex-basis: 100%;
    height: 0;
  }

  .page-header-block{
    margin-bottom: 12px;
  }

  .page-header-block h1{
    margin: 0;
    text-wrap: balance;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .page-header-meta{
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.40;
  }

  .mc-card-inner{
    padding-left: 12px;
    padding-right: 12px;
  }

  .mc-card-inner .muted{
    margin-bottom: 9px;
    font-size: 0.92rem;
    line-height: 1.48;
  }

  .more-button{
    margin-top: 12px;
    min-height: 40px;
    padding: 0 16px;
    border: 1px solid var(--line-strong);
    border-radius: 11px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font: inherit;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    transition:
      transform 0.18s ease,
      background-color 0.18s ease,
      border-color 0.18s ease,
      box-shadow 0.18s ease,
      opacity 0.18s ease;
  }

  .more-button:hover{
    opacity: 1;
    transform: translateY(-1px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
  }

  .is-hidden{
    display: none !important;
  }

  .meta-list{
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .meta-list li{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    font-size: 0.95rem;
    line-height: 1.34;
  }

  .meta-list li:last-child{
    border-bottom: none;
    padding-bottom: 0;
  }

  .meta-list .meta-label{
    flex: 0 0 auto;
    min-width: 6.2em;
    color: #c7cedc;
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.34;
  }

  .meta-list li > span:last-child{
    flex: 1 1 auto;
    min-width: 0;
    color: var(--text);
    overflow-wrap: anywhere;
    word-break: break-word;
    line-height: 1.34;
  }

  .meta-list li.meta-list-block{
    display: block;
    padding-top: 9px;
    padding-bottom: 9px;
  }

  .meta-list-block .meta-label{
    display: block;
    margin-bottom: 4px;
    min-width: 0;
    line-height: 1.34;
  }

    display: block;
    line-height: 1.40;
    font-size: 0.94rem;
  }

  .battle-list a,
  .appearance-list a{
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 0.15em;
  }

  .state-card-message{
    margin: 0;
    color: var(--muted);
    line-height: 1.55;
    font-size: 0.93rem;
  }

  .state-card-message.error{
    color: var(--danger);
    font-weight: 700;
  }

  .mc-note{
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .championship-line{
    display: block;
    line-height: 1.42;
  }

    margin-top: 1px;
  }

  .championship-event-link{
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 0.15em;
  }

    top: 8px;
    z-index: 5;
    display: inline-block;
    margin: 0 0 8px;
    padding: 6px 9px;
    border: 1px solid rgba(216,180,106,0.18);
    border-radius: 10px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%),
      linear-gradient(180deg, rgba(24, 28, 41, 0.92) 0%, rgba(14, 18, 28, 0.92) 100%);

    -webkit-backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.015) inset,
      0 8px 18px rgba(0,0,0,0.12);
  }

  .appearance-list{
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .battle-list li,
  .appearance-list li{
    margin: 0;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }

  .battle-list li:last-child,
  .appearance-list li:last-child{
    border-bottom: none;
  }

  .battle-opponent{
    display: block;
    min-width: 0;
    line-height: 1.36;
    font-size: 0.98rem;
    font-weight: 600;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .battle-event{
    display: block;
    margin-top: 4px;
    color: #8f97aa;
    font-size: 0.88rem;
    line-height: 1.34;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .battle-event-link{
    display: inline-flex;
    align-items: center;
    gap: 0.32em;
    color: #8f97aa;
    text-decoration: none;
    border-bottom: none;
    cursor: pointer;
    max-width: 100%;
  }

  .battle-event-link::after{
    content: "›";
    font-size: 0.95em;
    line-height: 1;
    opacity: 0.78;
    transform: translateY(-0.02em);
    flex: 0 0 auto;
  }

  .battle-event-link:visited{
    color: #8f97aa;
    text-decoration: none;
  }

  .battle-event-link:hover{
    color: #a3acc1;
    text-decoration: none;
    opacity: 1;
  }

  .battle-event-link:active{
    color: #aeb7cb;
    text-decoration: none;
  }

  .appearance-link-wrap a,
  .appearance-link-wrap span{
    color: inherit;
    text-decoration: none;
    display: block;
  }

  .appearance-link-wrap a:hover{
    opacity: 0.95;
  }

  .appearance-name{
    display: block;
    line-height: 1.34;
    word-break: break-word;
    overflow-wrap: anywhere;
    text-decoration: underline;
    text-underline-offset: 0.15em;
    font-size: 0.98rem;
    font-weight: 500;
  }

  .appearance-date{
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 0.87rem;
    line-height: 1.32;
  }

    .page-top{
      margin-bottom: 14px;
    }

    .page-mini-logo{
      margin-bottom: 8px;
    }

    .page-nav-pills{
      gap: 7px;
      margin-bottom: 12px;
    }

    .page-nav-pill{
      min-height: 34px;
      padding: 0 12px;
      font-size: 0.86rem;
    }

      margin-bottom: 10px;

    .page-header-block h1{

      line-height: 1.12;

      font-size: 0.82rem;
      line-height: 1.34;
    }

      padding-right: 10px;

      font-size: 0.82rem;
      line-height: 1.38;
    }

      padding: 8px 0;
      font-size: 0.87rem;

    }

    .meta-list-block .meta-value-block{
      line-height: 1.42;
      font-size: 0.86rem;
    }

    .state-card-message{
      font-size: 0.82rem;
      line-height: 1.38;
    }

    .mc-note{
      font-size: 0.8rem;
      line-height: 1.34;
    }

    .battle-section-heading,
    .appearance-section-heading{
      top: 6px;
      margin-bottom: 7px;
      padding: 5px 8px;
    }

    .battle-list li,
    .appearance-list li{
      padding: 8px 0;
    }

    .battle-opponent{
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .battle-event{
      margin-top: 3px;
      font-size: 0.8rem;
      line-height: 1.28;
    }

    .appearance-name{
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .appearance-date{
      margin-top: 1px;
      font-size: 0.79rem;
      line-height: 1.26;
    }

    .more-button{
      margin-top: 10px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      font-size: 0.84rem;
    }
  }
