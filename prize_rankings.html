<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>獲得賞金ランキング | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration: none;
    }

    .page-header-block{
      margin-bottom: 14px;
    }

    .page-header-block h1{
      margin: 0;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 700;
      line-height: 1.2;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .page-nav-pill:hover{
      text-decoration: none;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
      opacity: 1;
    }

    .page-nav-break{
      flex-basis: 100%;
      height: 0;
    }

    .ranking-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%),
        linear-gradient(180deg, rgba(18, 22, 31, 0.96) 0%, rgba(14, 18, 28, 0.98) 100%);
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
    }

    .ranking-card-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .ranking-status {
      margin: 0;
      color: var(--muted);
    }

    .ranking-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .ranking-list li {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .ranking-list li:last-child {
      border-bottom: none;
    }

    .rank-no {
      font-variant-numeric: tabular-nums;
      font-size: 1rem;
      font-weight: 900;
      color: var(--accent-dim);
      text-align: right;
    }

    .ranking-list li:nth-child(1) .rank-no,
    .ranking-list li:nth-child(2) .rank-no,
    .ranking-list li:nth-child(3) .rank-no {
      color: var(--accent);
    }

    .rank-name {
      min-width: 0;
    }

    .rank-name a,
    .rank-name span {
      display: inline-block;
      max-width: 100%;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.14em;
      font-weight: 700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .rank-money {
      font-variant-numeric: tabular-nums;
      color: var(--accent-soft);
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }

    @media (max-width: 640px) {
      .page-top{
        margin-bottom: 14px;
      }

      .page-mini-logo{
        margin-bottom: 8px;
      }

      .page-header-block{
        margin-bottom: 12px;
      }

      .page-nav-pills{
        gap: 7px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: 0.86rem;
      }

      .ranking-card {
        padding: 14px;
        border-radius: 18px;
      }

      .ranking-card-head{
        margin-bottom: 6px;
      }

      .ranking-list li {
        grid-template-columns: 42px minmax(0, 1fr) auto;
        gap: 8px;
      }

      .rank-no {
        font-size: 0.95rem;
      }

      .rank-money {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <div class="page-header-block">
        <h1>賞金ランキング</h1>
      </div>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>
    </div>

    <section class="ranking-card">
      <div class="ranking-card-head">
        <p id="ranking-status" class="ranking-status"></p>
        <a class="rank-name-link" href="ranking_spec.html">ランキング仕様</a>
      </div>
      <ol id="ranking-list" class="ranking-list"></ol>
    </section>
  </div>

  <script>
    const PRIZE_RANKINGS_JSON_URL = "./data/prize_rankings.json";

    function formatYen(value) {
      const num = Number(value || 0);
      return num.toLocaleString("ja-JP");
    }

    async function loadPrizeRankingsJson() {
      const res = await fetch(PRIZE_RANKINGS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function loadPrizeRankings() {
      const statusEl = document.getElementById("ranking-status");
      const listEl = document.getElementById("ranking-list");

      loadPrizeRankingsJson()
        .then((data) => {
          console.log("prize ranking page:", data);
          listEl.innerHTML = "";
          statusEl.classList.remove("error");

          try {
            if (!data) {
              statusEl.textContent = "レスポンスが空です";
              statusEl.classList.add("error");
              return;
            }

            if (data.error) {
              statusEl.textContent = "データ取得エラー";
              statusEl.classList.add("error");
              return;
            }

            const rankings = Array.isArray(data.rankings) ? data.rankings : [];

            rankings.forEach((item, index) => {
              const li = document.createElement("li");

              const rankNo = document.createElement("span");
              rankNo.className = "rank-no";
              rankNo.textContent = `${item.rank || index + 1}.`;

              const nameEl = document.createElement("span");
              nameEl.className = "rank-name";

              const mcName = item.mc_name ? String(item.mc_name) : "名前不明";
              const mcId = item.mc_id ? String(item.mc_id) : "";

              if (mcId) {
                const a = document.createElement("a");
                a.href = `mc.html?mc_id=${encodeURIComponent(mcId)}`;
                a.textContent = mcName;
                a.title = mcName;
                nameEl.appendChild(a);
              } else {
                const span = document.createElement("span");
                span.textContent = mcName;
                span.title = mcName;
                nameEl.appendChild(span);
              }

              const moneyEl = document.createElement("span");
              moneyEl.className = "rank-money";
              moneyEl.textContent = formatYen(item.total_prize_money || 0);

              li.appendChild(rankNo);
              li.appendChild(nameEl);
              li.appendChild(moneyEl);
              listEl.appendChild(li);
            });

            statusEl.textContent = "";

            if (rankings.length === 0) {
              statusEl.textContent = "表示できるデータがありません";
            }
          } catch (err) {
            console.error(err);
            statusEl.textContent = "描画エラー";
            statusEl.classList.add("error");
          }
        })
        .catch((err) => {
          console.error(err);
          statusEl.textContent = "読み込みに失敗しました";
          statusEl.classList.add("error");
        });
    }

    loadPrizeRankings();
  </script>
</body>
</html>
