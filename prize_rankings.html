<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>獲得賞金ランキング | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .rankings-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .rankings-table-wrap {
      overflow-x: visible;
      width: 100%;
    }

    table.rankings-table {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 0;
    }

    table.rankings-table col:nth-child(1) {
      width: 58px;
    }

    table.rankings-table col:nth-child(2) {
      width: auto;
    }

    table.rankings-table col:nth-child(3) {
      width: 132px;
    }

    table.rankings-table th,
    table.rankings-table td {
      padding: 6px 8px;
      vertical-align: middle;
    }

    table.rankings-table th:nth-child(1),
    table.rankings-table td:nth-child(1) {
      text-align: right;
      white-space: nowrap;
    }

    table.rankings-table th:nth-child(2),
    table.rankings-table td:nth-child(2) {
      text-align: left;
      min-width: 0;
    }

    table.rankings-table th:nth-child(3),
    table.rankings-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    table.rankings-table tbody tr:hover {
      opacity: 0.92;
    }

    .rank-name-link,
    .rank-name-text {
      display: block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: normal;
      overflow-wrap: normal;
      word-break: keep-all;
      line-height: 1.35;
    }

    .rank-name-link:hover {
      opacity: 0.85;
    }

    .name-break{
      display: inline;
    }

    .name-break.forced{
      display: block;
    }

    @media (max-width: 640px) {
      .rankings-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      table.rankings-table col:nth-child(1) {
        width: 42px;
      }

      table.rankings-table col:nth-child(3) {
        width: 104px;
      }

      table.rankings-table th,
      table.rankings-table td {
        padding: 5px 4px;
        font-size: 0.9rem;
      }

      .rank-name-link,
      .rank-name-text {
        line-height: 1.28;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>賞金ランキング</h1>
      </div>
    </div>

    <section class="card">
      <div class="rankings-card-inner">
        <p id="ranking-status" class="muted"></p>

        <div class="rankings-table-wrap">
          <table class="rankings-table">
            <colgroup>
              <col />
              <col />
              <col />
            </colgroup>
            <thead>
              <tr>
                <th>順位</th>
                <th>MC名</th>
                <th>賞金</th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const PRIZE_RANKINGS_JSON_URL = "./data/prize_rankings.json";

    function formatYen(value) {
      const num = Number(value || 0);
      return "¥" + num.toLocaleString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildNameHtml(name) {
      const s = String(name || "");

      if (!s) return "";

      if (s.includes("(")) {
        const idx = s.indexOf("(");
        const left = s.slice(0, idx).trimEnd();
        const right = s.slice(idx);
        return `${escapeHtml(left)}<span class="name-break forced"></span>${escapeHtml(right)}`;
      }

      const akaMatch = s.match(/^(.*?)(\s+a\.k\.a\.\s+.*)$/i);
      if (akaMatch) {
        return `${escapeHtml(akaMatch[1])}<span class="name-break forced"></span>${escapeHtml(akaMatch[2].trim())}`;
      }

      return escapeHtml(s);
    }

    async function loadPrizeRankingsJson() {
      const res = await fetch(PRIZE_RANKINGS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function loadPrizeRankings() {
      const statusEl = document.getElementById("ranking-status");
      const bodyEl = document.getElementById("ranking-body");

      loadPrizeRankingsJson()
        .then((data) => {
          console.log("prize ranking page:", data);

          bodyEl.innerHTML = "";
          statusEl.classList.remove("error");

          try {
            if (!data) {
              statusEl.textContent = "レスポンスが空です";
              statusEl.classList.add("error");
              return;
            }

            if (data.error) {
              statusEl.textContent = "データ取得エラー";
              statusEl.classList.add("error");
              return;
            }

            const rankings = Array.isArray(data.rankings) ? data.rankings : [];

            rankings.forEach((item, index) => {
              const tr = document.createElement("tr");

              const rankTd = document.createElement("td");
              const nameTd = document.createElement("td");
              const moneyTd = document.createElement("td");

              const rank = item.rank || (index + 1);
              const mcId = item.mc_id || "";
              const mcName = item.mc_name || "名前不明";

              rankTd.textContent = rank;
              moneyTd.textContent = formatYen(item.total_prize_money || 0);

              if (mcId) {
                const a = document.createElement("a");
                a.href = `mc.html?mc_id=${encodeURIComponent(mcId)}`;
                a.className = "rank-name-link";
                a.title = mcName;
                a.innerHTML = buildNameHtml(mcName);
                nameTd.appendChild(a);
              } else {
                const span = document.createElement("span");
                span.className = "rank-name-text";
                span.title = mcName;
                span.innerHTML = buildNameHtml(mcName);
                nameTd.appendChild(span);
              }

              tr.appendChild(rankTd);
              tr.appendChild(nameTd);
              tr.appendChild(moneyTd);

              bodyEl.appendChild(tr);
            });

            statusEl.textContent = "";

            if (rankings.length === 0) {
              statusEl.textContent = "表示できるデータがありません";
            }
          } catch (err) {
            console.error(err);
            statusEl.textContent = "描画エラー";
            statusEl.classList.add("error");
          }
        })
        .catch((err) => {
          console.error(err);
          statusEl.textContent = "読み込みに失敗しました";
          statusEl.classList.add("error");
        });
    }

    loadPrizeRankings();
  </script>
</body>
</html>
